name: BeatStep
options:
  bundleIdPrefix: com.beatstep
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"

packages:
  SpotifyiOS:
    url: https://github.com/spotify/ios-sdk
    from: "2.1.4"
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.0.0"

targets:
  BeatStep:
    type: application
    platform: iOS
    sources:
      - path: BeatStep
        excludes:
          - "Secrets.example.swift"
    info:
      path: BeatStep/Resources/Info.plist
      properties:
        LSApplicationQueriesSchemes:
          - spotify
        CFBundleURLTypes:
          - CFBundleURLName: com.beatstep.app
            CFBundleURLSchemes:
              - beatstep
        UIBackgroundModes:
          - audio
        NSMotionUsageDescription: "BeatStep needs motion access to detect your running cadence and match music to your pace."
        UILaunchScreen: {}
        UIUserInterfaceStyle: Dark
    entitlements:
      path: BeatStep/Resources/BeatStep.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beatstep.app
    dependencies:
      - package: SpotifyiOS
      - package: KeychainAccess
      - sdk: AVFoundation.framework
      - sdk: MediaPlayer.framework
      - sdk: CoreMotion.framework

  BeatStepTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BeatStepTests
    dependencies:
      - target: BeatStep
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
